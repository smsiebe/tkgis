name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk xvfb

    - name: Install GRDL ecosystem from source
      run: |
        pip install "grdl @ git+https://github.com/geoint-org/GRDL.git@main"
        pip install "grdl-runtime @ git+https://github.com/geoint-org/grdl-runtime.git@main"

    - name: Install package with dev dependencies
      run: pip install -e ".[dev]"

    - name: Lint with ruff
      run: ruff check src/ tests/

    - name: Run tests with coverage
      run: |
        xvfb-run --auto-servernum pytest tests/ -x -q --tb=short --cov=tkgis --cov-report=term-missing

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install ruff
      run: pip install ruff

    - name: Check formatting
      run: ruff check src/ tests/
